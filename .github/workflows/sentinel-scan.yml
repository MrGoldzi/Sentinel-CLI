name: Sentinel Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Monday at 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results

jobs:
  sentinel-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for full git context

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Sentinel uses only the Python standard library - no extra deps needed

      - name: Run Sentinel security scan
        id: sentinel
        continue-on-error: true
        run: |
          # Run Sentinel and capture exit code (bypasses set -e from GitHub Actions)
          python -m sentinel scan . --sarif sentinel-results.sarif --severity-threshold MEDIUM || exit_code=$?
          echo "exit_code=${exit_code:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sentinel-results.sarif
          category: sentinel

      - name: Display scan summary
        if: always()
        run: |
          EXIT_CODE="${{ steps.sentinel.outputs.exit_code }}"
          echo "### Sentinel Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$EXIT_CODE" = "2" ]; then
            echo "🔴 **BLOCKED** - High severity security issues detected!" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$EXIT_CODE" = "1" ]; then
            echo "🟡 **WARNING** - Medium severity issues found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "🟢 **PASS** - No security issues found" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Exit code: \`$EXIT_CODE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Results uploaded to **Security > Code scanning** tab." >> "$GITHUB_STEP_SUMMARY"
